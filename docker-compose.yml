services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-xian_parts_v2}
      DB_USER: ${DB_USER:-inventory}
      DB_PASSWORD: ${DB_PASSWORD:-inventory_password}
      APP_BASE_URL: ${APP_BASE_URL:-}
      DIGIKEY_CLIENT_ID: ${DIGIKEY_CLIENT_ID:-}
      DIGIKEY_CLIENT_SECRET: ${DIGIKEY_CLIENT_SECRET:-}
      MOUSER_API_KEY: ${MOUSER_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MARIADB_DATABASE: ${DB_NAME:-xian_parts_v2}
      MARIADB_USER: ${DB_USER:-inventory}
      MARIADB_PASSWORD: ${DB_PASSWORD:-inventory_password}
    volumes:
      - db_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db_data:
